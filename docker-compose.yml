name: chatbot-evaluation

services:
  # The Chatbot API running on port 8080
  api:
    container_name: chatbot-api
    build: 
      context: https://github.com/abdullabasim/Chatbot-Evaluation.git#main
    ports:
      - "8080:8080"
    command: >
      bash -c "cp mock_api/.env.example mock_api/.env && python -m mock_api.main"

  # The Evaluator pipeline
  evaluator:
    container_name: chatbot-evaluator
    build: 
      context: https://github.com/abdullabasim/Chatbot-Evaluation.git#main
    depends_on:
      - api
    command: >
      bash -c "cp evaluator/.env.example evaluator/.env && python -m evaluator.run_tests --dataset test_cases.json --base-url http://api:8080 --runs 3 --output /app/report.json"
    volumes:
      - .:/app
